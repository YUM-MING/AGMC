name: Deploy to Oracle Cloud

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Oracle Server via SSH
        uses: appleboy/ssh-action@v1
        env:
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}.git
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: REPO_URL
          script: |
            set -e
            # 프로젝트 폴더로 이동 (없으면 생성)
            mkdir -p ~/agmc
            cd ~/agmc
            
            # Git 초기화 및 업데이트
            if [ ! -d .git ]; then
              git init
              git remote add origin "$REPO_URL" || git remote set-url origin "$REPO_URL"
            fi
            
            git fetch origin main
            git reset --hard origin/main
            
            # .env 파일 생성/업데이트 (시크릿에서 최신 값으로 덮어쓰기)
            echo "VITE_OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}" > .env
            echo "VITE_IMAGE_OPENAI_API_KEY=${{ secrets.IMAGE_OPENAI_API_KEY }}" >> .env
            echo "HF_TOKEN=${{ secrets.HF_TOKEN }}" >> .env
            
            # 도커 빌드 및 실행
            docker compose up -d --build
